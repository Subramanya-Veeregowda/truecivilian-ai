spring:
  config:
    activate:
      on-profile: prod

  # Strict JPA settings for production: NO auto-updating schemas
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        generate_statistics: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  # Optimized Connection Pooling via HikariCP for production databases
  datasource:
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 20000
      pool-name: TrueCivilianProdHikariPool

# Strict Production Logging Configuration
logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: ERROR
    com.truecivilian: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Server level configurations for production
server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    whitelabel:
      enabled: false
  servlet:
    session:
      cookie:
        http-only: true
        secure: true
