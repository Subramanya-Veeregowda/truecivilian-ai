spring:
  application:
    name: truecivilian-api
  
  # PostgreSQL Connection Settings
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:truecivilian}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  # Hibernate JPA configurations
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# Security & Stateless JWT Constants
security:
  jwt:
    secret-key: ${JWT_SECRET_KEY:dGVzdHNlY3JldGtleWZvcnRydWVjaXZpbGlhbmFpcGxhdGZvcm1zZWN1cml0eXNlY3JldGtleTI1NmJpdHM=}
    expiration-ms: 86400000 # 24 Hours in milliseconds

# Third-Party Cloud integrations
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

# Google AI Studio Integration
google:
  gemini:
    api-key: ${GEMINI_API_KEY}
    base-url: https://generativelanguage.googleapis.com/v1beta/models
    model-name: gemini-1.5-flash # Preferred fast multi-modal engine

# Google Maps Platform Configurations
maps:
  api-key: ${GOOGLE_MAPS_API_KEY}
